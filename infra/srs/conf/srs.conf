# SRS 最小配置：RTMP 接收 + HTTP-FLV/HLS 拉流 + WebRTC 低延迟预览
# 文档：https://ossrs.net/lts/zh-cn/docs/v6/doc/getting-started

listen              1935;              # RTMP 监听端口
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_server {
    enabled         on;
    listen          8080;              # HTTP-FLV / HLS
    dir             ./objs/nginx/html;
}

http_api {
    enabled         on;
    listen          1985;              # HTTP API
}

stats {
    network         0;
}

rtc_server {
    enabled         on;
    listen          8000;              # UDP
    candidate       $CANDIDATE;        # 外网/本机 IP；本地可填 127.0.0.1 或用 host 模式
}

vhost __defaultVhost__ {
    hls {
        enabled         on;
    }
    http_remux {
        enabled         on;
        mount           [vhost]/[app]/[stream].flv;
    }
    play {
        gop_cache       on;
        queue_length    10;
    }
    rtc {
        enabled         on;
        rtmp_to_rtc     on;
    }
}
