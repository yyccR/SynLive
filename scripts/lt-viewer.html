<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>数字人预览 · LiveTalking</title>
<style>
  body{margin:0;background:#0b0f14;color:#e8eef5;font-family:system-ui,-apple-system,sans-serif;padding:18px}
  h3{margin:0 0 12px;font-size:18px}
  .row{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
  button{font:inherit;padding:9px 16px;border-radius:8px;border:0;background:#f0b35a;color:#111821;font-weight:800;cursor:pointer}
  button:disabled{opacity:.5;cursor:default}
  video{max-width:560px;width:100%;background:#000;border-radius:12px;display:block}
  .s{font-size:13px;color:#9aa8b8}
  .ok{color:#39e58c}.err{color:#ff5c5c}
  input{font:inherit;padding:8px 10px;border-radius:8px;border:1px solid #2a3645;background:#111a23;color:#e8eef5;width:230px}
</style>
</head>
<body>
<h3>数字人预览（LiveTalking WebRTC）</h3>
<div class="row">
  <label class="s">LiveTalking 地址</label>
  <input id="base" value="">
  <button id="b">▶ 连接数字人</button>
  <span id="st" class="s">点连接拉取画面</span>
</div>
<video id="v" autoplay playsinline muted></video>
<p class="s">画面黑屏/不出？检查：①平台是否开放了 LiveTalking 的 TCP 端口 ②是否开放了一段 UDP（WebRTC 媒体）③LiveTalking 容器是否在跑。</p>
<script>
  // 默认用本页同源（把本文件放到 LiveTalking 的 web/ 下，经 aiohttp 静态服务）
  const $ = id => document.getElementById(id);
  if (!$('base').value) $('base').value = location.origin;
  let pc;
  $('b').onclick = async () => {
    const base = $('base').value.trim().replace(/\/$/, '');
    $('st').className = 's'; $('st').textContent = '连接中…'; $('b').disabled = true;
    try {
      pc = new RTCPeerConnection();
      pc.addTransceiver('video', { direction: 'recvonly' });
      pc.addTransceiver('audio', { direction: 'recvonly' });
      pc.ontrack = e => { $('v').srcObject = e.streams[0]; };
      pc.oniceconnectionstatechange = () => {
        const s = pc.iceConnectionState;
        $('st').textContent = 'ICE: ' + s + (s === 'connected' ? ' ✔' : '');
      };
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      const r = await fetch(base + '/offer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sdp: offer.sdp, type: offer.type })
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const ans = await r.json();
      await pc.setRemoteDescription(ans);
      $('st').className = 's ok'; $('st').textContent = '已连接 ✔';
    } catch (e) {
      $('st').className = 's err'; $('st').textContent = '失败: ' + e.message;
    } finally { $('b').disabled = false; }
  };
</script>
</body>
</html>
